<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index of /archive/</title>

<!--
  mirror node // partial
  missing: /final/
  do not reconstruct
-->

<style>
body{
  background:#fff;
  color:#000;
  font-family:Verdana, Arial, sans-serif;
  font-size:11px;
}
.wrap{width:720px;margin:30px auto;}
h1{font-size:16px;font-weight:normal;}
hr{border:0;border-top:1px solid #999;margin:12px 0;}
.server{color:#666;font-size:10px;}

table{width:100%;font-family:"Courier New",monospace;font-size:12px;border-collapse:collapse;margin-top:15px;}
th{text-align:left;border-bottom:1px solid #aaa;font-weight:normal;padding:3px 0;}
td{padding:3px 0;color:#333;}

.dead{color:#888;text-decoration:line-through;}

.hidden{display:none;}

/* subtle interactive zone */
.zone{
  margin-top:20px;
  height:120px;
  border:1px solid #ccc;
  background:#fafafa;
  position:relative;
}

.pixel{
  position:absolute;
  width:6px;
  height:6px;
  background:#000;
  left:63%;
  top:58%;
  opacity:.08;
  cursor:pointer;
}

.module{
  display:none;
  margin-top:15px;
  border:1px solid #bbb;
  padding:10px;
  font-family:"Courier New",monospace;
  background:#f5f5f5;
}

.module.visible{display:block;}

.lock{
  width:60px;height:50px;
  background:#666;
  position:relative;
  margin:10px 0;
}

.lock:before{
  content:"";
  position:absolute;
  width:30px;height:30px;
  border:6px solid #666;
  border-bottom:none;
  border-radius:20px 20px 0 0;
  left:9px;top:-28px;
}

.key{
  width:80px;height:20px;
  background:#999;
  margin-top:8px;
  cursor:pointer;
}

.prompt{display:none;margin-top:10px;}
.prompt.visible{display:block;}

.result{display:none;margin-top:10px;color:#333;}
.result.visible{display:block;}

</style>
</head>
<body>
<div class="wrap">

<h1>Index of /archive/</h1>
<hr>
<div class="server">Apache/1.3.26 Server</div>

<table>
<tr><th>Name</th><th>Last modified</th><th>Size</th></tr>
<tr><td><a href="#">Parent Directory</a></td><td>-</td><td>-</td></tr>
<tr><td class="dead">final/</td><td>03-Nov-2005</td><td>-</td></tr>
<tr><td class="dead">session.log</td><td>03-Nov-2005</td><td>0</td></tr>
<tr><td><a href="#" id="open">tmp/</a></td><td>03-Nov-2005</td><td>-</td></tr>
</table>

<div class="zone">
  <div class="pixel" id="pixel"></div>
</div>

<div class="module" id="module">
  fragment loaded<br>
  integrity: partial<br><br>

  <div class="lock" id="lock"></div>
  <div class="key" id="key"></div>

  <div class="prompt" id="prompt">
    password <input id="password">
    <button id="btn">ok</button>
  </div>

  <div class="result" id="result">
    ok<br>
    archive missing<br>
  </div>
</div>

<!-- R-17 -->

</div>

<script>
var PASSWORD="R-17";

var pixel=document.getElementById("pixel");
var module=document.getElementById("module");
var key=document.getElementById("key");
var lock=document.getElementById("lock");
var prompt=document.getElementById("prompt");
var result=document.getElementById("result");
var password=document.getElementById("password");

pixel.onclick=function(){
  module.className="module visible";
};

key.onclick=function(){
  prompt.className="prompt visible";
};

document.getElementById("btn").onclick=function(){
  if(password.value===PASSWORD){
    result.className="result visible";
  }else{
    password.value="";
  }
};
</script>
</body>
</html>
