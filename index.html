<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>access</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:monospace;
}

/* BOX */
.box{
  width:320px;
  height:320px;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  position:relative;
}

/* LOCK */
.lock{
  width:80px;
  height:70px;
  background:linear-gradient(145deg,#aaa,#444);
  position:relative;
  transform:perspective(200px) rotateX(10deg);
}

.lock:before{
  content:"";
  position:absolute;
  width:40px;
  height:40px;
  border:8px solid #666;
  border-bottom:none;
  border-radius:30px 30px 0 0;
  left:12px;
  top:-40px;
}

.hole{
  width:10px;
  height:10px;
  background:#000;
  border-radius:50%;
  position:absolute;
  left:50%;
  top:20px;
  transform:translateX(-50%);
}

.key{
  width:80px;
  height:15px;
  background:#777;
  margin-top:20px;
  cursor:pointer;
}

/* INPUT */
.prompt{
  display:none;
  margin-top:20px;
}

.eye{
  display:none;
  width:200px;
  height:200px;
  background:radial-gradient(circle,#fff 20%,#000 21%);
  position:relative;
}

.hit{
  position:absolute;
  width:40px;
  height:40px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  cursor:pointer;
}

</style>
</head>

<body>

<div class="box" id="box">

  <div class="lock" id="lock">
    <div class="hole"></div>
  </div>

  <div class="key" id="key"></div>

  <div class="prompt" id="prompt">
    <input id="pwd" placeholder="key">
    <button onclick="check()">ok</button>
  </div>

  <div class="eye" id="eye">
    <div class="hit" onclick="secret()"></div>
  </div>

</div>

<script>

let inserted = false;
const PASSWORD = "R-17";

/* clé → active input */
document.getElementById("key").onclick = function(){
  if(!inserted){
    inserted = true;
    document.getElementById("prompt").style.display = "block";
  }
}

/* check mdp */
function check(){
  const val = document.getElementById("pwd").value;
  if(val === PASSWORD){
    document.getElementById("lock").style.display = "none";
    document.getElementById("key").style.display = "none";
    document.getElementById("prompt").style.display = "none";
    document.getElementById("eye").style.display = "block";
  }
}

/* clic oeil */
function secret(){
  alert("found");
}

</script>

</body>
</html>
