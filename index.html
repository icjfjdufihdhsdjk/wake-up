<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>access</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  font-family:"Courier New", monospace;
  overflow:hidden;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  width:430px;
  height:430px;
  background:#f2f2ec;
  border:1px solid #d6d6cf;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 0 1px #111,
    0 22px 80px rgba(0,0,0,.95),
    inset 0 0 70px rgba(0,0,0,.08);
}

.box:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom,rgba(0,0,0,.035),transparent 25%,rgba(0,0,0,.07)),
    repeating-linear-gradient(to bottom,rgba(0,0,0,.025),rgba(0,0,0,.025) 1px,transparent 1px,transparent 4px);
  z-index:50;
  pointer-events:none;
}

.box:after{
  content:"";
  position:absolute;
  inset:18px;
  border:1px solid rgba(0,0,0,.08);
  pointer-events:none;
  z-index:51;
}

.scene{
  position:absolute;
  inset:0;
  z-index:2;
}

/* =========================
   STABLE SVG LOCK
========================= */
.lock-zone{
  position:absolute;
  left:50%;
  top:42%;
  width:190px;
  height:210px;
  transform:translate(-50%,-50%);
}

.lock-svg{
  position:absolute;
  left:0;
  top:0;
  width:190px;
  height:210px;
  overflow:visible;
  filter:drop-shadow(17px 20px 16px rgba(0,0,0,.36));
}

.lock-group{
  transform-origin:95px 126px;
  transition:transform .45s ease, filter .3s ease;
}

.lock-group.near{
  transform:scale(1.025);
  filter:drop-shadow(0 0 10px rgba(88,77,37,.34));
}

.shackle-group{
  transform-origin:62px 112px;
  transition:transform .65s ease;
}

.lock-group.open .shackle-group{
  transform:translate(-5px,-16px) rotate(-23deg);
}

.lock-hit{
  position:absolute;
  left:38px;
  top:80px;
  width:112px;
  height:112px;
  pointer-events:none;
}

/* =========================
   KEY
========================= */
.key{
  position:absolute;
  left:43px;
  bottom:42px;
  width:168px;
  height:58px;
  cursor:grab;
  z-index:10;
  transform:rotate(-13deg);
  filter:drop-shadow(10px 16px 12px rgba(0,0,0,.35));
  transform-origin:center;
  touch-action:none;
}

.key:active{cursor:grabbing}
.key.hidden{opacity:0;pointer-events:none}
.key.snap{
  transition:left .35s ease, top .35s ease, transform .35s ease, opacity .2s ease .22s;
  transform:rotate(0deg) scale(.78);
}

.key-ring{
  position:absolute;
  left:0;
  top:5px;
  width:48px;
  height:48px;
  border-radius:50%;
  border:9px solid #9b8b57;
  background:#f2f2ec;
  box-shadow:inset 3px 3px 5px rgba(255,255,255,.45),inset -5px -5px 7px rgba(0,0,0,.4),2px 2px 0 #52492d;
}

.key-ring:after{
  content:"";
  position:absolute;
  left:8px;
  top:8px;
  width:14px;
  height:14px;
  border-radius:50%;
  background:rgba(255,255,255,.15);
}

.key-neck{
  position:absolute;
  left:43px;
  top:24px;
  width:24px;
  height:11px;
  background:linear-gradient(to bottom,#d4c37a,#776a3d 65%,#3f3720);
  border-radius:3px;
  box-shadow:inset 0 2px 2px rgba(255,255,255,.4),inset 0 -2px 2px rgba(0,0,0,.45);
}

.key-stem{
  position:absolute;
  left:63px;
  top:25px;
  width:78px;
  height:9px;
  background:linear-gradient(to bottom,#d6c67c,#8f7f47 52%,#42381d);
  border-radius:7px;
  box-shadow:inset 0 2px 2px rgba(255,255,255,.45),inset 0 -2px 2px rgba(0,0,0,.42);
}

.key-stem:after{
  content:"";
  position:absolute;
  left:12px;
  right:8px;
  top:2px;
  height:1px;
  background:rgba(255,255,255,.45);
}

.key-bit{
  position:absolute;
  left:134px;
  top:18px;
  width:31px;
  height:28px;
  background:linear-gradient(135deg,#c8b96e,#716335 62%,#332c18);
  clip-path:polygon(0 24%,100% 24%,100% 55%,76% 55%,76% 100%,55% 100%,55% 62%,35% 62%,35% 88%,14% 88%,14% 55%,0 55%);
  box-shadow:inset 2px 2px 3px rgba(255,255,255,.4);
}

.key-lines{
  position:absolute;
  left:72px;
  top:22px;
  width:55px;
  height:2px;
  background:rgba(255,255,255,.32);
}

/* =========================
   PASSWORD
========================= */
.prompt{
  display:none;
  position:absolute;
  left:50%;
  bottom:32px;
  transform:translateX(-50%);
  width:245px;
  text-align:center;
  color:#333;
  z-index:30;
}

.prompt.visible{display:block}

.prompt label{
  display:block;
  font-size:11px;
  letter-spacing:2px;
  margin-bottom:7px;
}

.prompt input{
  width:150px;
  background:#fff;
  border:1px solid #777;
  padding:5px;
  font-family:"Courier New",monospace;
}

.prompt button{
  border:1px solid #777;
  background:#e6e6e6;
  padding:5px 9px;
  font-family:"Courier New",monospace;
  cursor:pointer;
}

.msg{
  min-height:14px;
  margin-top:8px;
  color:#7b2222;
  font-size:11px;
}

/* =========================
   EYE
========================= */
.eye-screen{
  display:none;
  position:absolute;
  inset:0;
  background:#f2f2ec;
  z-index:40;
  justify-content:center;
  align-items:center;
}

.eye-screen.visible{display:flex}

.eye-wrap{
  width:260px;
  height:170px;
  position:relative;
}

.eye{
  position:absolute;
  left:50%;
  top:50%;
  width:230px;
  height:112px;
  transform:translate(-50%,-50%);
  border-radius:75% 75% 70% 70% / 65% 65% 55% 55%;
  background:
    radial-gradient(circle at 50% 50%,#050505 0 11px,#dcdcdc 12px 18px,#111 19px 24px,transparent 25px),
    radial-gradient(ellipse at center,#f7f7f2 0 45%,#c9c9c1 58%,#777 72%,#151515 73%,transparent 74%);
  border:1px solid #111;
  box-shadow:inset 0 0 26px rgba(0,0,0,.45),0 12px 30px rgba(0,0,0,.25);
}

.eye:before,.eye:after{
  content:"";
  position:absolute;
  top:50%;
  width:72px;
  height:1px;
  background:#111;
  opacity:.25;
}
.eye:before{left:12px;transform:rotate(5deg)}
.eye:after{right:12px;transform:rotate(-5deg)}

.dot-hit{
  position:absolute;
  left:50%;
  top:50%;
  width:38px;
  height:38px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  cursor:crosshair;
}
.dot-hit:hover{outline:1px dotted rgba(0,0,0,.35)}

.eye-note{
  display:none;
  position:absolute;
  left:50%;
  bottom:34px;
  transform:translateX(-50%);
  color:#222;
  font-size:11px;
  letter-spacing:1px;
}
.eye-note.visible{display:block}

@media(max-width:500px){
  .box{width:92vw;height:92vw;max-height:430px}
  .scene{transform:scale(.9)}
}
</style>
</head>
<body>

<div class="box">
  <div class="scene" id="scene">
    <div class="lock-zone">
      <svg class="lock-svg" viewBox="0 0 190 210" aria-hidden="true">
        <defs>
          <linearGradient id="metalBody" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#d2cab0"/>
            <stop offset="0.18" stop-color="#9a8e69"/>
            <stop offset="0.48" stop-color="#574f3a"/>
            <stop offset="0.75" stop-color="#29251e"/>
            <stop offset="1" stop-color="#12100d"/>
          </linearGradient>
          <linearGradient id="metalSide" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#6b6249"/>
            <stop offset="1" stop-color="#171512"/>
          </linearGradient>
          <linearGradient id="shackleMetal" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#28251f"/>
            <stop offset="0.25" stop-color="#706b5b"/>
            <stop offset="0.55" stop-color="#5a5548"/>
            <stop offset="1" stop-color="#1d1a16"/>
          </linearGradient>
          <radialGradient id="screwMetal" cx="35%" cy="30%" r="70%">
            <stop offset="0" stop-color="#aaa07d"/>
            <stop offset="0.55" stop-color="#5f5742"/>
            <stop offset="1" stop-color="#211e18"/>
          </radialGradient>
        </defs>

        <g class="lock-group" id="lockGroup">
          <g class="shackle-group" id="shackleGroup">
            <path d="M58 105 L58 62 C58 29 132 29 132 62 L132 105"
                  fill="none" stroke="#211f1a" stroke-width="24" stroke-linecap="round" opacity=".8" transform="translate(7 7)"/>
            <path d="M58 105 L58 62 C58 29 132 29 132 62 L132 105"
                  fill="none" stroke="url(#shackleMetal)" stroke-width="24" stroke-linecap="round"/>
            <path d="M51 102 L51 137" stroke="#28241d" stroke-width="14"/>
            <path d="M139 102 L139 137" stroke="#343029" stroke-width="14"/>
          </g>

          <polygon points="54,89 145,89 163,103 163,181 54,181" fill="#15130f" opacity=".9"/>
          <polygon points="145,89 163,103 163,181 145,167" fill="url(#metalSide)"/>
          <polygon points="54,181 145,181 163,167 70,167" fill="#211d16"/>

          <rect x="43" y="82" width="110" height="102" rx="12" fill="url(#metalBody)" stroke="#5c5544"/>
          <rect x="57" y="97" width="82" height="72" rx="7" fill="none" stroke="rgba(255,255,255,.25)"/>

          <circle cx="98" cy="128" r="12" fill="#050505"/>
          <rect x="93" y="138" width="10" height="34" rx="4" fill="#050505"/>

          <circle cx="59" cy="98" r="7" fill="url(#screwMetal)"/>
          <line x1="55" y1="98" x2="63" y2="98" stroke="#181510" stroke-width="1" transform="rotate(-25 59 98)"/>
          <circle cx="137" cy="98" r="7" fill="url(#screwMetal)"/>
          <line x1="133" y1="98" x2="141" y2="98" stroke="#181510" stroke-width="1" transform="rotate(18 137 98)"/>
          <circle cx="59" cy="166" r="7" fill="url(#screwMetal)"/>
          <line x1="55" y1="166" x2="63" y2="166" stroke="#181510" stroke-width="1" transform="rotate(12 59 166)"/>
          <circle cx="137" cy="166" r="7" fill="url(#screwMetal)"/>
          <line x1="133" y1="166" x2="141" y2="166" stroke="#181510" stroke-width="1" transform="rotate(-28 137 166)"/>
        </g>
      </svg>
      <div class="lock-hit" id="lockHit"></div>
    </div>

    <div class="key" id="key" title="token">
      <div class="key-ring"></div>
      <div class="key-neck"></div>
      <div class="key-stem"></div>
      <div class="key-lines"></div>
      <div class="key-bit"></div>
    </div>
  </div>

  <form class="prompt" id="prompt">
    <label>ACCESS KEY</label>
    <input id="password" type="password" autocomplete="off">
    <button type="submit">ok</button>
    <div class="msg" id="msg"></div>
  </form>

  <div class="eye-screen" id="eyeScreen">
    <div class="eye-wrap">
      <div class="eye"></div>
      <div class="dot-hit" id="dotHit"></div>
    </div>
    <div class="eye-note" id="eyeNote">registered</div>
  </div>
</div>

<script>
var PASSWORD = "R-17";

var key = document.getElementById("key");
var lockGroup = document.getElementById("lockGroup");
var lockHit = document.getElementById("lockHit");
var promptBox = document.getElementById("prompt");
var password = document.getElementById("password");
var msg = document.getElementById("msg");
var eyeScreen = document.getElementById("eyeScreen");
var dotHit = document.getElementById("dotHit");
var eyeNote = document.getElementById("eyeNote");
var scene = document.getElementById("scene");

var dragging = false;
var inserted = false;
var offsetX = 0;
var offsetY = 0;

function startDrag(x,y){
  if(inserted) return;

  dragging = true;
  var r = key.getBoundingClientRect();
  offsetX = x - r.left;
  offsetY = y - r.top;

  key.style.position = "fixed";
  key.style.left = r.left + "px";
  key.style.top = r.top + "px";
  key.style.bottom = "auto";
  key.style.zIndex = 999;
}

function moveDrag(x,y){
  if(!dragging || inserted) return;

  key.style.left = (x - offsetX) + "px";
  key.style.top = (y - offsetY) + "px";

  if(overLock()){
    lockGroup.classList.add("near");
  }else{
    lockGroup.classList.remove("near");
  }
}

function endDrag(){
  if(!dragging || inserted) return;

  dragging = false;

  if(overLock()){
    inserted = true;
    snapKeyIntoLock();
  }else{
    lockGroup.classList.remove("near");
  }
}

function overLock(){
  var k = key.getBoundingClientRect();
  var l = lockHit.getBoundingClientRect();
  var x = k.left + k.width * 0.78;
  var y = k.top + k.height * 0.52;
  return x > l.left && x < l.right && y > l.top && y < l.bottom;
}

function snapKeyIntoLock(){
  var l = lockHit.getBoundingClientRect();
  var targetX = l.left + l.width / 2 - 120;
  var targetY = l.top + l.height / 2 - 28;

  key.className = "key snap";
  key.style.left = targetX + "px";
  key.style.top = targetY + "px";

  lockGroup.classList.add("near");

  setTimeout(function(){
    key.className = "key snap hidden";
    lockGroup.classList.remove("near");
    lockGroup.classList.add("open");
    promptBox.className = "prompt visible";
  },420);

  setTimeout(function(){
    password.focus();
  },650);
}

key.addEventListener("mousedown",function(e){
  startDrag(e.clientX,e.clientY);
  e.preventDefault();
});

document.addEventListener("mousemove",function(e){
  moveDrag(e.clientX,e.clientY);
});

document.addEventListener("mouseup",endDrag);

key.addEventListener("touchstart",function(e){
  var t = e.touches[0];
  startDrag(t.clientX,t.clientY);
},{passive:true});

document.addEventListener("touchmove",function(e){
  if(!dragging) return;
  var t = e.touches[0];
  moveDrag(t.clientX,t.clientY);
},{passive:true});

document.addEventListener("touchend",endDrag);

promptBox.addEventListener("submit",function(e){
  e.preventDefault();

  if(password.value === PASSWORD){
    promptBox.style.display = "none";
    scene.style.display = "none";
    eyeScreen.className = "eye-screen visible";
  }else{
    msg.innerHTML = "denied";
    password.value = "";
  }
});

dotHit.onclick = function(){
  eyeNote.className = "eye-note visible";
};
</script>
</body>
</html>
